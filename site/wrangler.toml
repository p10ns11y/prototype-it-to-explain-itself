# Cloudflare Workers static assets (Pages has merged into Workers).
# Docs: https://developers.cloudflare.com/workers/static-assets/
#
# Git CI: build = pnpm install && pnpm build
#         deploy = npx wrangler deploy
#
# Local preview after build:
#   pnpm build && wrangler dev

name = "prototype-it-to-explain-itself"
compatibility_date = "2025-01-01"
workers_dev = true

[assets]
directory = "./dist"
