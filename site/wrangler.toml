# Wrangler config for local Cloudflare Pages development only.
# Git-connected Pages CI should NOT run wrangler deploy — see site-deploy.md.
#
# Run from inside the site/ directory:
#   pnpm install
#   pnpm build
#   pnpm pages:dev
#
# Dashboard (Git): Root directory = site, build = pnpm install && pnpm build,
# output = dist, deploy command = empty.

name = "prototype-it-to-explain-itself"
compatibility_date = "2025-01-01"
pages_build_output_dir = "dist"
